name: doomschooling-prod

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/beterer/doomschooling-web:latest}
    restart: unless-stopped
    environment:
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    ports:
      # The existing Cloudflare Tunnel points to localhost:5173. This port is
      # loopback-only and is never reachable directly from the internet.
      - "127.0.0.1:5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - doomschooling

  api:
    image: ${API_IMAGE:-ghcr.io/beterer/doomschooling-api:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_ORIGIN: https://doomschooling.org
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-v4-flash}
      OPENROUTER_SITE_URL: https://doomschooling.org
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      GENERATION_EMAIL_ALLOWLIST: ${GENERATION_EMAIL_ALLOWLIST}
      # Optional OTLP export to Grafana Cloud. The API still writes JSON logs
      # to stdout if these are empty or if the backend is unavailable.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - doomschooling
    # Deliberately no published port. Only the web proxy can reach the API.

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # TUNNEL_TOKEN avoids exposing the token in the process command line.
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host
    depends_on:
      web:
        condition: service_healthy

networks:
  doomschooling:
    driver: bridge

volumes:
  uploads:
